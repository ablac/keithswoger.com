name: Agent Contract

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: agent-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  agent-contract:
    name: Entrypoint and PR discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate agent contract
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/agent-contract/check.py --event "$GITHUB_EVENT_PATH"
